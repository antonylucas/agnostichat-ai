version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.1
    container_name: agnostichat-elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - agnostichat_agnostichat-network

  init-data:
    build:
      context: ../..  # Contexto corrigido para a raiz do projeto
      dockerfile: docker-examples/elastic-test/Dockerfile.init
    depends_on:
      - elasticsearch
    networks:
      - agnostichat_agnostichat-network

volumes:
  elasticsearch-data:
    driver: local

networks:
  agnostichat_agnostichat-network:
    external: true 