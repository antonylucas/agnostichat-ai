version: '3.8'

services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c", "ollama pull llama2 && ollama serve"]
    networks:
      - agnostichat-network

volumes:
  ollama_models:

networks:
  agnostichat-network:
    driver: bridge 